protocol: "A"

pendulum_model:
  name: "WorldModel"
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 16
  model_path: "model_saves/pendulum/model_WorldModel_combined_k15_Linear_steps100000_latent16.pt"

transfer:
  latent_angular: 16
  latent_B: 8
  hidden_dim: 64
  action_dim: 1

environment:
  name: "CartPoleSim"
  gravity: 9.8
  mass1: 0.1
  mass2: 1.0
  length: 10.0
  dt: 0.01
  max_action: 10.0
  damping: 0.0
  seed: 43

collector:
  num_trajectories: 100
  episode_time: 1000
  policy_seed: 35
  save: false
  impulse_policy: false
  windows_per_traj: 10

trainer:
  run_trainer: true
  batch_size: 256
  steps: 100000
  log_interval: 100

hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.01
  rollout_steps: 1
  rollout_decay: "Linear"
  gamma: 0.9

checkpointing:
  save: true
  save_path: "model_saves/test/"

settings:
  device: "cpu"

baseline: false