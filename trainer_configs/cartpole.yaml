# Environment
environment:

  name: "CartPoleSim"
  gravity: 9.8
  mass1: 0.1
  mass2: 1.0
  length: 1.0
  dt: 0.02
  max_action: 10.0
  damping: 0.0
  seed: 42
# Data Collection
collector:
  num_trajectories: 50
  episode_time: 1000
  policy_seed: 35
  save: false
  impulse_policy: true
# Datasets
datasets:
  use_existing: false
  paths:
    - "datasets/v0_CartPoleSim_*.npz"
# Model
model:
  run_model: false
  name: WorldModel
  state_dim: 5
  action_dim: 1
  hidden_dim: 64
  latent_dim: 8
# Trainer
trainer:
  run_trainer: false
  batch_size: 256
  steps: 100000
  log_interval: 100
# Rollout Engine
rollout_engine:
  run_rollouts: False
  horizon: 50
  zero_actions: False
# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.001
  rollout_steps: 1
  rollout_decay: "Linear"
  gamma: 0.9
# Checkpointing
checkpointing:
  save: false
  save_path: "model_saves/"
  load: False
  load_path: null
# Settings
settings:
  device: "cpu"