# Environment
environment:
 name: "PendulumSim"
 gravity: 9.8
 mass1: 1.0
 length: 2.0
 dt: 0.01
 max_action: 10.0
 damping: 0.0
 seed: 46

# Data Collection Parameters
collector:
  num_trajectories: 500
  episode_time: 1000
  policy_seed: 35
  save: false
  impulse_policy: true

datasets:
  use_existing: true
  paths:
    - "datasets/impulse_policy/v0_PendulumSim_*gravity9.80*length2.0*.npz"

# Model Parameterrs
model:
  run_model: true
  name: WorldModel
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 64

# Training and Testing Parameters
trainer:
  run_trainer: true
  batch_size: 256
  steps: 100000
  log_interval: 100
# Visualizer Parameters

# Rollout Engine
rollout_engine:
  run_rollouts: False
  horizon: 1


# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.001
  rollout_decay: "Linear"
  gamma: 0.9
  rollout_steps: 15
  

checkpointing:
  save: true
  save_path: "model_saves/"
  load: False
  load_path: null

settings:
  device: "cpu"
