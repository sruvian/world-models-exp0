# Environment
environment:
 name: "PendulumSim"
 gravity: 5.0
 mass1: 1.0
 length: 10.0
 dt: 0.01
 max_action: 10.0
 damping: 0.0
 seed: 44

# Data Collection Parameters
collector:
  num_trajectories: 500
  episode_time: 1000
  policy_seed: 35
  save: true
  
  impulse_policy: true
datasets:
  use_existing: True
  paths:
    - "datasets/v0_PendulumSim_*grav5.00*length10.0.npz"

# Model Parameterrs
model:
  run_model: True
  name: WorldModel
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 8

# Training and Testing Parameters
trainer:
  run_trainer: True
  batch_size: 256
  steps: 100000
  log_interval: 100
# Visualizer Parameters

# Rollout Engine
rollout_engine:
  run_rollouts: False
  horizon: 1


# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.001
  rollout_decay: "Linear"
  gamma: 0.9
  rollout_steps: 50
  

checkpointing:
  save: true
  save_path: "model_saves/"
  load: False
  load_path: null

settings:
  device: "cpu"
