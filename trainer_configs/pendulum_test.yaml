# Environment
environment:
  run_env: False
  name: "PendulumSim"
  gravity: 9.8
  pen_mass: 1.0
  pen_length: 10.0
  dt: 0.01
  max_torque: 10
  damping: 0.0
  seed: 42

# Data Collection
collector:
  num_trajectories: 500
  episode_time: 100000
  policy_seed: 35
  save: False

# Datasets
datasets:
  use_existing: False
  paths:
    - "datasets/v0_PendulumSim_*.npz"

# Model
model:
  run_model: False
  name: WorldModel
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 64

# Trainer
trainer:
  run_trainer: False
  batch_size: 32
  steps: 500
  log_interval: 50

# Rollout Engine
rollout_engine:
  run_rollouts: True
  horizon: 500
  zero_actions: False

# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.001
  rollout_steps: 50
  rollout_decay: "Linear"
  gamma: 0.9

# Checkpointing
checkpointing:
  save: False
  save_path: "model_saves/"
  load: True
  load_path: model_saves/model_WorldModel_g9.8_l10.0_k5_Linear_steps100000_latent64.pt

# Settings
settings:
  device: "cpu"