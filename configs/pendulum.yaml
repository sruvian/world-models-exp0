# Environment
environment:
 name: "PendulumSim"
 gravity: 9.8
 pen_mass: 1.0
 pen_length: 2.0
 dt: 0.01
 max_torque: 2.0
 damping: 0.0
 seed: 42

# Data Collection Parameters
collector:
  num_trajectories: 500
  episode_time: 1000
  policy_seed: 35
  save: True
  
datasets:
  use_existing: False
  paths:
    - "datasets/v0_PendulumSim_*.npz

# Model Parameterrs
model:
  run_model: True
  name: WorldModel
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 8

# Training and Testing Parameters
trainer:
  run_trainer: False
  batch_size: 256
  steps: 100000
  log_interval: 100
# Visualizer Parameters

# Rollout Engine
rollout_engine:
  run_rollouts: False
  horizon: 1


# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 1e-3
  rollout_decay: "Linear"
  gamma: 0.9
  rollout_steps: 1
  

checkpointing:
  save: True
  save_path: "model_saves/"
  load: False
  load_path: null

settings:
  device: "cpu"