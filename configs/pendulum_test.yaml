# Environment
environment:
  name: "PendulumSim"
  gravity: 9.8
  pen_mass: 1.0
  pen_length: 2.0
  dt: 0.01
  max_torque: 2.0
  damping: 0.0
  seed: 42

# Data Collection
collector:
  num_trajectories: 50
  episode_time: 100
  policy_seed: 35
  save: False

# Datasets
datasets:
  use_existing: False
  paths:
    - "datasets/v0_PendulumSim_*.npz"

# Model
model:
  run_model: True
  name: WorldModel
  state_dim: 3
  action_dim: 1
  hidden_dim: 64
  latent_dim: 8

# Trainer
trainer:
  run_trainer: True
  batch_size: 32
  steps: 500
  log_interval: 50

# Rollout Engine
rollout_engine:
  run_rollouts: False
  horizon: 1

# Hyperparameters
hyperparams:
  optimizer: Adam
  loss: MSE
  lr: 0.001
  rollout_steps: 1
  rollout_decay: "Linear"
  gamma: 0.9

# Checkpointing
checkpointing:
  save: False
  save_path: "checkpoints/"
  load: False
  load_path: null

# Settings
settings:
  device: "cpu"